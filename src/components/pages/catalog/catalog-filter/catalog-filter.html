<div class="catalog-filter">
  <div class="catalog-filter__header is-active" id="main-filter-trigger">
    <h2 class="catalog-filter__title">ФІЛЬТРИ</h2>
    <i class="ph ph-minus catalog-filter__header-icon"></i>
  </div>

  <div class="catalog-filter__body is-active" id="main-filter-content">
    <div class="catalog-filter__groups">
      <!-- Switches Section -->
      <div class="catalog-filter__quick">
        <div class="filter-switch">
          <span class="filter-switch__label">Новинки</span>
          <label class="switch">
            <input type="checkbox" name="is_new">
            <span class="switch__slider"></span>
          </label>
        </div>
        <div class="filter-switch">
          <span class="filter-switch__label">Акційні пропозиції</span>
          <label class="switch">
            <input type="checkbox" name="is_promo" checked>
            <span class="switch__slider"></span>
          </label>
        </div>
      </div>

      <!-- Обʼєм -->
      <div class="filter-group is-active">
        <button class="filter-group__trigger" aria-expanded="true">
          <span>Обʼєм</span>
          <i class="ph ph-minus filter-group__icon"></i>
        </button>
        <div class="filter-group__content">
          <div class="filter-group__volumes-grid">
            <label class="volume-item">
              <input type="radio" name="volume" value="5">
              <span class="volume-item__box">5</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="12" checked>
              <span class="volume-item__box">12</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="15">
              <span class="volume-item__box">15</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="30">
              <span class="volume-item__box">30</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="60">
              <span class="volume-item__box">60</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="100">
              <span class="volume-item__box">100</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="150">
              <span class="volume-item__box">150</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="500">
              <span class="volume-item__box">500</span>
            </label>
            <label class="volume-item">
              <input type="radio" name="volume" value="1000">
              <span class="volume-item__box">1000</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Доступність -->
      <div class="filter-group is-active">
        <button class="filter-group__trigger" aria-expanded="true">
          <span>Доступність</span>
          <i class="ph ph-minus filter-group__icon"></i>
        </button>
        <div class="filter-group__content">
          <div class="filter-group__checkboxes">
            <label class="custom-checkbox">
              <input type="checkbox" name="availability" value="in_stock">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">В наявності</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="availability" value="preorder">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">Передзамовлення</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Колір -->
      <div class="filter-group is-active">
        <button class="filter-group__trigger" aria-expanded="true">
          <span>Колір</span>
          <i class="ph ph-minus filter-group__icon"></i>
        </button>
        <div class="filter-group__content">
          <div class="filter-group__colors-list">
            <label class="color-item">
              <input type="checkbox" name="color" value="white">
              <span class="color-item__dot" style="background-color: #FFFFFF; border: 1px solid #E8E8E8;"></span>
              <span class="color-item__label">Білий</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="gray">
              <span class="color-item__dot" style="background-color: #ADADAD;"></span>
              <span class="color-item__label">Сірий</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="blue">
              <span class="color-item__dot" style="background-color: #93B8D3;"></span>
              <span class="color-item__label">Блакитний</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="pink">
              <span class="color-item__dot" style="background-color: #F1BCC4;"></span>
              <span class="color-item__label">Рожевий</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="orange">
              <span class="color-item__dot" style="background-color: #F3C478;"></span>
              <span class="color-item__label">Помаранчевий</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="bordeaux">
              <span class="color-item__dot" style="background-color: #8E2024;"></span>
              <span class="color-item__label">Бордовий</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="red">
              <span class="color-item__dot" style="background-color: #EE4E4E;"></span>
              <span class="color-item__label">Червоний</span>
            </label>
            <label class="color-item">
              <input type="checkbox" name="color" value="beige">
              <span class="color-item__dot" style="background-color: #EFE6D5;"></span>
              <span class="color-item__label">Бежевий</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Особливість -->
      <div class="filter-group">
        <button class="filter-group__trigger" aria-expanded="false">
          <span>Особливість</span>
          <i class="ph ph-plus filter-group__icon"></i>
        </button>
        <div class="filter-group__content">
          <div class="filter-group__checkboxes">
            <label class="custom-checkbox">
              <input type="checkbox" name="feature" value="face">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">Для обличчя</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="feature" value="body">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">Для тіла</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="feature" value="moisture">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">Зволоження</span>
            </label>
            <label class="custom-checkbox">
              <input type="checkbox" name="feature" value="cleanse">
              <span class="custom-checkbox__box"></span>
              <span class="custom-checkbox__label">Очищення</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
