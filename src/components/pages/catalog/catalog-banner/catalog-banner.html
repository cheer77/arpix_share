<div class="catalog-banner">
  <div class="catalog-banner__image-wrapper">
    <img src="/src/assets/images/catalog/catalog-banner.jpg" alt="" class="catalog-banner__image">
  </div>
  <div class="catalog-banner__content">
    <p class="catalog-banner__text">{{#if title}}{{title}}{{else}}Jorem ipsum dolor sit amet, consectetur adipiscmattis{{/if}}</p>
    <a href="{{#if link}}{{link}}{{else}}#{{/if}}" class="catalog-banner__link">
      <span>{{#if linkText}}{{linkText}}{{else}}Лінк перехід до акції або товару{{/if}}</span>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M1 7H13M13 7L7 1M13 7L7 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</div>
