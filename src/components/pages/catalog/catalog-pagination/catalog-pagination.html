<div class="catalog-pagination">
  <div class="catalog-pagination__inner">
    
    <!-- Show More Button -->
    <button class="catalog-pagination__show-more" id="catalog-show-more">
      <div class="catalog-pagination__show-more-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4V1L8 5L12 9V6C15.31 6 18 8.69 18 12C18 13.01 17.75 13.97 17.3 14.8L18.77 16.27C19.54 15.03 20 13.57 20 12C20 7.58 16.42 4 12 4ZM12 18C8.69 18 6 15.31 6 12C6 10.99 6.25 10.03 6.7 9.2L5.23 7.73C4.46 8.97 4 10.43 4 12C4 16.42 7.58 20 12 20V23L16 19L12 15V18Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="catalog-pagination__show-more-text">Показати ще</span>
    </button>

    <!-- Numeric Tabs -->
    <div class="catalog-pagination__tabs">
      <div class="catalog-pagination__tabs-list">
        <button class="catalog-pagination__tab is-active" data-page="1">1</button>
        <button class="catalog-pagination__tab" data-page="2">2</button>
        <button class="catalog-pagination__arrow" aria-label="Наступна сторінка">
          <i class="ph ph-caret-right"></i>
        </button>
      </div>
      <div class="catalog-pagination__line-base"></div>
      <div class="catalog-pagination__line-active"></div>
    </div>

  </div>
</div>
